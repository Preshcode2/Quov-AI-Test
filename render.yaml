services:
  - type: web
    name: quov-ai-api
    runtime: node
    buildCommand: NODE_ENV=development pnpm install; pnpm run build
    startCommand: node artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: WHOP_API_KEY
        sync: false
      - key: WHOP_WEBHOOK_SECRET
        sync: false
      - key: CRYPTO_SECRET
        generateValue: true
      - key: VITE_APP_URL
        sync: false
      - key: PORT
        value: 10000
